<!DOCTYPE html><html><head><meta charset="utf-8"><title>时钟练习</title><style>*{margin:0;padding:0}li{list-style:none}#container{background-color:#262c33;border:20px solid #373f4a;border-radius:50%;width:400px;height:400px;margin:20px auto;position:relative}#container ul{border-radius:50%;width:100%;height:100%;position:relative}#container li{transform-origin:5px 190px;background-color:#d4d5d6;border-radius:50%;width:10px;height:10px;margin-left:-5px;position:absolute;top:10px;left:50%}#container li:nth-child(5n+1){border-radius:5px;height:20px}#container li:nth-child(15n+1){border-radius:5px;height:30px}.hour{transform-origin:top;background-color:#fff;width:14px;height:105px;margin-left:-7px;position:absolute;top:50%;left:50%}.hour:after{content:"";background-color:#fff;width:14px;height:14px;position:absolute;bottom:-7px;transform:rotate(45deg)skew(15deg,15deg)}.minute{transform-origin:top;background-color:#fff;width:10px;height:155px;margin-left:-5px;position:absolute;top:50%;left:50%}.minute:after{content:"";background-color:#fff;width:10px;height:10px;position:absolute;bottom:-5px;transform:rotate(45deg)skew(15deg,15deg)}.second{transform-origin:50% 50px;background-color:#f16b41;border-radius:3px;width:6px;height:225px;margin-top:-50px;margin-left:-3px;position:absolute;top:50%;left:50%}.dot{background-color:#f16b41;border-radius:50%;width:20px;height:20px;margin-top:-10px;margin-left:-10px;position:absolute;top:50%;left:50%}</style></head><body> <div id="container"> <ul id="scale-container"> </ul> <div class="hour"></div> <div class="minute"></div> <div class="second"></div> <div class="dot"></div> </div> <script type="application/javascript">window.onload=function(){for(var e=document.getElementById("scale-container"),t=0;t<60;t++)e.innerHTML+='<li style="transform: rotate('+6*t+'deg);"></li>';function n(){var e=new Date,t=e.getHours(),n=e.getMinutes(),o=e.getSeconds();console.log(t,n,o);var s=document.getElementsByClassName("hour")[0],a=document.getElementsByClassName("minute")[0],r=document.getElementsByClassName("second")[0];s.style.transform="rotate("+(30*t+180+6*n/360*30)+"deg)",a.style.transform="rotate("+(6*n+180)+"deg)",r.style.transform="rotate("+(6*o+180)+"deg)"}n(),setInterval(function(){n()},1e3)};</script> </body></html>
