<!DOCTYPE html><html><head><meta charset="utf-8"><title>风车练习</title><style>#container{border:1px solid red;width:400px;height:600px;margin:20px auto;position:relative;overflow:hidden}#pillar{background-color:#483d8b;width:300px;height:300px;margin-left:-150px;position:absolute;bottom:-150px;left:50%;transform:rotate(45deg)skew(40deg,40deg)}#leaf-cont{z-index:2;width:400px;height:400px;margin-top:20px;transition:all 1s;position:relative}#container:hover #leaf-cont{transform:rotate(720deg)}.leaf{transform-origin:0 0;border-top:30px solid #6495ed;border-bottom:30px solid #0000;border-left:100px solid #6495ed;border-right:100px solid #0000;width:0;height:0;position:absolute;top:50%;left:50%}.leaf:nth-child(2n){border-color:#ff1493 #0000 #0000 #ff1493}.leaf:nth-child(2){transform:rotate(90deg)}.leaf:nth-child(3){transform:rotate(180deg)}.leaf:nth-child(4){transform:rotate(270deg)}.core{border:10px solid #ca365a;border-color:#ca365a #c0a4b5;border-radius:50%;width:0;height:0;margin-top:-10px;margin-left:-10px;position:absolute;top:50%;left:50%}</style></head><body> <div id="container"> <div id="leaf-cont"> <div class="leaf"></div> <div class="leaf"></div> <div class="leaf"></div> <div class="leaf"></div> <div class="core"></div> </div> <div id="pillar"></div> </div> </body></html>
