<!DOCTYPE html><html><head><meta charset="utf-8"><title>3D盒子展开练习</title><style>*{margin:0;padding:0}#container{margin-top:200px}.box{transform-style:preserve-3d;perspective:8000px;transform-origin:center center 100px;width:200px;height:200px;margin:0 auto;transition:all 3s;animation:20s linear 5s forwards rotateBox;position:relative}.face{text-align:center;color:#fff;opacity:.6;background-color:#8a2be2;width:200px;height:200px;font-size:34px;line-height:200px;position:absolute}.face:first-child{transform-origin:top;animation:1s linear forwards openTop}.face:nth-child(2){transform-origin:bottom;animation:1s linear 1s forwards openBottom}.face:nth-child(3){transform-origin:0;animation:1s linear 2s forwards openLeft}.face:nth-child(4){transform-origin:100%;animation:1s linear 3s forwards openRight}.face:nth-child(5){animation:1s linear 4s forwards openFront}@keyframes openTop{0%{transform:rotateX(0)}to{background-color:#adff2f;transform:rotateX(90deg)}}@keyframes openBottom{0%{transform:rotateX(0)}to{background-color:gold;transform:rotateX(-90deg)}}@keyframes openLeft{0%{transform:rotateY(0)}to{background-color:#deb887;transform:rotateY(-90deg)}}@keyframes openRight{0%{transform:rotateY(0)}to{background-color:#6495ed;transform:rotateY(90deg)}}@keyframes openFront{0%{transform:translateZ(0)}to{background-color:#5f9ea0;transform:translateZ(200px)}}@keyframes rotateBox{0%{transform:matrix(1,0,0,1,0,0)}25%{transform:rotateX(0)rotateY(-360deg)}50%{transform:rotateX(-90deg)rotateY(0)}75%{transform:rotateX(0)rotateY(360deg)}to{transform:matrix(1,0,0,1,0,0)}}</style></head><body> <div id="container"> <div class="box"> <div class="face">上</div> <div class="face">下</div> <div class="face">左</div> <div class="face">右</div> <div class="face">前</div> <div class="face">后</div> </div> </div> </body></html>
