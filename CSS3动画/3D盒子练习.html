<!DOCTYPE html><html><head><meta charset="utf-8"><title>3D盒子练习</title><style>*{margin:0;padding:0}#container{border:1px solid #d8d8d8;width:600px;margin:50px auto;position:relative}.box{transform-style:preserve-3d;perspective:8000px;transform-origin:center center 100px;width:200px;height:200px;margin:200px auto;transition:all 3s;animation:30s linear infinite rotate-frame;position:relative}.face{text-align:center;color:#fff;opacity:.6;background-color:#8a2be2;width:200px;height:200px;font-size:34px;line-height:200px;position:absolute}.face:first-child{transform-origin:bottom;transform:rotateX(-90deg)}.face:nth-child(2){transform-origin:top;background-color:#adff2f;transform:rotateX(90deg)}.face:nth-child(3){transform-origin:100%;background-color:gold;transform:rotateY(90deg)}.face:nth-child(4){transform-origin:0;background-color:#deb887;transform:rotateY(-90deg)}.face:nth-child(5){background-color:#6495ed;transform:translateZ(200px)}.face:nth-child(6){background-color:#5f9ea0;transform:translateZ(0)}#container:hover .box{transform:rotateX(360deg)rotateY(-360deg)}</style></head><body> <div id="container"> <div class="box"> <div class="face">上</div> <div class="face">下</div> <div class="face">左</div> <div class="face">右</div> <div class="face">前</div> <div class="face">后</div> </div> </div> </body></html>
