<!DOCTYPE html><html><head><meta charset="utf-8"><title>改变文字大小</title><style>#root{text-align:center;border:3px solid #333;width:300px;height:400px}.opArea{margin-top:150px}.text{margin-top:30px}</style></head><body> <div id="root"> <div class="opArea"> <input type="button" id="add" value="+"> <input type="button" id="sub" value="-"> </div> <p class="text">我是文字</p> </div> <script type="application/javascript">var e=document.getElementById("add"),t=document.getElementById("sub"),n=document.getElementsByClassName("text")[0],l=15;e.onclick=function(){l<=30?(l+=2,n.style.fontSize=l+"px"):alert("已经是最大字体！")},t.onclick=function(){l>=5?(l-=2,n.style.fontSize=l+"px"):alert("已经是最小字体！")};</script> </body></html>
